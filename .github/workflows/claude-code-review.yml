name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trusted_bots: |
            dependabot[bot]
          direct_prompt: |
            Review this pull request concisely. Focus on necessary improvements and actionable feedback. Keep the review under typical monitor height.
            
            Prioritize:
            - Critical bugs or security issues
            - Code quality problems that need fixing
            - Performance issues
            - Missing test coverage for new functionality
            
            Guidelines:
            - Be direct and specific about required changes
            - Minimize praise unless code demonstrates exceptional quality
            - No emojis
            - Focus on what needs improvement rather than what works well
          use_sticky_comment: true
