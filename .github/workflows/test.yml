name: Tests
on: [push]
jobs:
  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Coveralls

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group dev
      
      - name: Run linting and fast tests
        run: |
          uv run --frozen ruff format --check
          uv run --frozen ruff check
          uv run --frozen pytest haproxy_template_ic/test -m "not slow" --cov=haproxy_template_ic --cov-report=term-missing -s

      - name: Run slow tests with coverage
        run: |
          uv run --frozen pytest haproxy_template_ic/test -m "slow" --cluster-name haproxy-template-ic-test --coverage --cov=haproxy_template_ic --cov-report=term-missing --cov-append -s

      - name: Combine coverage data and create XML
        run: |
          find . -name '.coverage*' -type f -exec uv run coverage combine {} + || true
          uv run coverage xml
          find . -name '.coverage*' -type f -delete || true
      
      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
