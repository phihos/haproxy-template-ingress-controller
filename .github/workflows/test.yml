name: Tests

on: 
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linting:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run code formatting check
        run: uv run --frozen ruff format --check

      - name: Run linting
        run: uv run --frozen ruff check

      - name: Run type checking
        run: uv run --frozen mypy haproxy_template_ic/

      - name: Run security scan
        run: uv run bandit -c pyproject.toml -r haproxy_template_ic/ --quiet

      - name: Run dependency hygiene check
        run: uv run --frozen deptry .

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for coverage reporting

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: |
          uv run --frozen pytest tests -m "not integration and not acceptance" \
            --cov=haproxy_template_ic \
            --cov-report=term-missing \
            --tb=short

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage
          retention-days: 7
          if-no-files-found: error

  integration-tests:
    name: Integration Tests  
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for coverage reporting

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run integration tests
        run: |
          uv run --frozen pytest tests -m "integration" \
            --cov=haproxy_template_ic \
            --cov-report=term-missing \
            --tb=short \
            -n auto

      - name: Upload integration test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: .coverage*
          retention-days: 7
          if-no-files-found: error

  acceptance-tests:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for coverage reporting

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run acceptance tests
        run: |
          uv run --frozen pytest tests -m "acceptance" \
            --cluster-name haproxy-template-ic-test \
            --coverage \
            --cov=haproxy_template_ic \
            --cov-report=term-missing \
            --tb=short \
            -n auto

      - name: Upload acceptance test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-acceptance
          path: .coverage*
          retention-days: 7
          if-no-files-found: error

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unit-tests, integration-tests, acceptance-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Download unit test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: ./coverage-unit/

      - name: Download integration test coverage  
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: ./coverage-integration/

      - name: Download acceptance test coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-acceptance
          path: ./coverage-acceptance/

      - name: Combine coverage data and create XML
        run: |
          # Copy all coverage files to current directory
          find ./coverage-* -name '.coverage*' -type f -exec cp {} . \;
          
          # Combine coverage data
          uv run coverage combine .coverage*
          
          # Generate XML report
          uv run coverage xml
          
          # Clean up coverage files
          rm -f .coverage*

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: full
          name: combined-test-suite
          fail_ci_if_error: true

  dev-script:
    name: Development Environment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install kind
        run: |
          KIND_VERSION=v0.24.0
          curl -Lo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Run dev environment script
        run: |
          bash ./scripts/start-dev-env.sh

      - name: Verify resources created by script
        run: |
          set -euo pipefail
          echo "Checking cluster info and namespaces..."
          kubectl cluster-info
          kubectl get ns haproxy-template-ic
          kubectl get ns echo
          echo "Checking controller deployment and service..."
          kubectl -n haproxy-template-ic get deploy/haproxy-template-ic
          kubectl -n haproxy-template-ic get svc haproxy-template-ic || true
          echo "Checking echo app resources..."
          kubectl -n echo get deploy/echo-server
          kubectl -n echo rollout status deploy/echo-server --timeout=120s
          kubectl -n echo get svc/echo-server
          kubectl -n echo get ingress/echo-server -o yaml | head -n 50

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name haproxy-template-ic-dev || true
