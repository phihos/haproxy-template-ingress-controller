name: Tests
on: [push]
jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for Coveralls

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.x"
          activate-environment: true
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Run linting and fast tests
        run: |
          uv run --frozen ruff format --check
          uv run --frozen ruff check
          uv run --frozen mypy haproxy_template_ic/
          uv run --frozen pytest tests -m "not slow" --cov=haproxy_template_ic --cov-report=term-missing -s

      - name: Run security and dependency checks
        run: |
          uv run bandit -c pyproject.toml -r haproxy_template_ic/ --quiet
          uv run --frozen deptry .

      - name: Run slow tests with coverage
        run: |
          uv run --frozen pytest tests -m "slow" --cluster-name haproxy-template-ic-test --coverage --cov=haproxy_template_ic --cov-report=term-missing --cov-append -s

      - name: Combine coverage data and create XML
        run: |
          find . -name '.coverage*' -type f -exec uv run coverage combine {} + || true
          uv run coverage xml
          find . -name '.coverage*' -type f -delete || true

      - name: Upload coverage to Coveralls
        uses: coverallsapp/github-action@v2
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}

  dev-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Install kind
        run: |
          KIND_VERSION=v0.24.0
          curl -Lo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Run dev environment script
        run: |
          bash ./scripts/start-dev-en.sh

      - name: Verify resources created by script
        run: |
          set -euo pipefail
          echo "Checking cluster info and namespaces..."
          kubectl cluster-info
          kubectl get ns haproxy-template-ic
          kubectl get ns echo
          echo "Checking controller deployment and service..."
          kubectl -n haproxy-template-ic get deploy/haproxy-template-ic
          kubectl -n haproxy-template-ic get svc haproxy-template-ic || true
          echo "Checking echo app resources..."
          kubectl -n echo get deploy/echo-server
          kubectl -n echo rollout status deploy/echo-server --timeout=120s
          kubectl -n echo get svc/echo-server
          kubectl -n echo get ingress/echo-server -o yaml | head -n 50

      - name: Cleanup kind cluster
        if: always()
        run: |
          kind delete cluster --name haproxy-template-ic-dev || true
