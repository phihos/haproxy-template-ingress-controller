name: Conventional Commits Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  commitizen-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Check commits
        uses: commitizen-tools/commitizen-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_only: true
