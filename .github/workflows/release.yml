name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: '0.8.x'
          activate-environment: true
          enable-cache: true

      - name: Generate artifacts (sdist/wheel)
        run: |
          uv build
          ls -la dist

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ steps.meta.outputs.tag }}
          path: dist/*

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.meta.outputs.tag }}
            type=raw,value=${{ steps.meta.outputs.version }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          file: ./Dockerfile
          target: production
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          build-args: |
            PYTHON_VERSION=3.13

      - name: Export image tar (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          platforms: linux/amd64
          file: ./Dockerfile
          target: production
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}-amd64
          outputs: type=tar,dest=/tmp/image-amd64.tar

      - name: Export image tar (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          platforms: linux/arm64
          file: ./Dockerfile
          target: production
          tags: ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.tag }}-arm64
          outputs: type=tar,dest=/tmp/image-arm64.tar

      - name: Upload image tars
        uses: actions/upload-artifact@v4
        with:
          name: images-${{ steps.meta.outputs.tag }}
          path: |
            /tmp/image-amd64.tar
            /tmp/image-arm64.tar
          compression-level: 0

  publish-release:
    name: Create GitHub Release
    needs: build-and-publish
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            artifacts/**
