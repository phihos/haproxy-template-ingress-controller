dataplaneapi:
  write_timeout: "1s"
  read_timeout: "30s"
  host: 0.0.0.0
  port: 5555
  advertised:
    api_address: ""
    api_port: 0
  scheme:
  - http
  userlist:
    userlist: dataplaneapi
    userlist_file: ""
  transaction:
    transaction_dir: /var/lib/dataplaneapi/transactions
    backups_number: 10
    backups_dir: /var/lib/dataplaneapi/backups
  resources:
    maps_dir: /etc/haproxy/maps
    ssl_certs_dir: /etc/haproxy/ssl
    general_storage_dir: /etc/haproxy/general
    spoe_dir: /etc/haproxy/spoe
haproxy:
  config_file: /etc/haproxy/haproxy.cfg
  haproxy_bin: /usr/local/sbin/haproxy
  delayed_start_max: "1s"
  reload:
    reload_delay: 5
    reload_cmd: /usr/local/bin/haproxy-socket-reload.sh
    restart_cmd: /usr/local/bin/haproxy-socket-reload.sh
    reload_strategy: custom
log_targets:
- log_to: stdout
  log_level: trace
  log_types:
  - access
  - app
