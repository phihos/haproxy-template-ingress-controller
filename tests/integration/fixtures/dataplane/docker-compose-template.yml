volumes:
  validation-config:
  production-config:

services:
  # Validation HAProxy
  validation-haproxy: &haproxy
    build:
      context: haproxy
      dockerfile: Dockerfile
    ports:
      - "{{VALIDATION_HAPROXY_PORT}}:80"
      - "{{VALIDATION_HEALTH_PORT}}:8404"
    volumes:
      - validation-config:/etc/haproxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8404/healthz"]
      interval: 2s
      timeout: 1s
      start_period: 2s
      retries: 2

  # Validation Dataplane API
  validation-dataplane-api: &dataplane
    build:
      context: dataplane
      dockerfile: Dockerfile
    ports:
      - "{{VALIDATION_PORT}}:5555"
    volumes:
      - validation-config:/etc/haproxy
    healthcheck:
      test: [ "CMD", "curl", "-f", "-u", "admin:adminpass", "http://localhost:5555/v3/info" ]
      interval: 2s
      timeout: 1s
      start_period: 3s
      retries: 2
    depends_on:
      validation-haproxy:
        condition: service_healthy

  # Production HAProxy
  production-haproxy:
    <<: *haproxy
    ports:
      - "{{HTTP_PORT}}:80"
      - "{{HEALTH_PORT}}:8404"
    volumes:
      - production-config:/etc/haproxy

  # Production Dataplane API
  production-dataplane-api:
    <<: *dataplane
    ports:
      - "{{PRODUCTION_PORT}}:5555"
    volumes:
      - production-config:/etc/haproxy
    depends_on:
      production-haproxy:
        condition: service_healthy
