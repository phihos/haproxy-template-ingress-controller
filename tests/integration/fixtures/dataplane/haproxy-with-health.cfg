global
    stats socket /etc/haproxy/haproxy-master.sock mode 600 level admin

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend main
    bind *:80
    use_backend web_servers if { hdr(host) -i example.com }
    default_backend default_servers

frontend health
    bind *:8404
    http-request return status 200 content-type text/plain string "OK" if { path /healthz }
    http-request return status 200 content-type application/json string "{\"status\":\"healthy\"}" if { path /health }

backend web_servers
    balance roundrobin
    option httpchk GET /health
    server web1 127.0.0.1:8001 check
    server web2 127.0.0.1:8002 check

backend default_servers
    balance roundrobin
    server default1 127.0.0.1:8003 check