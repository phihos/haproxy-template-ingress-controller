apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: haproxy-template-ic
rules:
  - apiGroups: [ "" ]
    resources: [ "services", "configmaps", "namespaces", "secrets", "endpoints" ]
    verbs: [ "get", "list", "watch" ]
  # Pods need patch permission for kopf operator annotations
  - apiGroups: [ "" ]
    resources: [ "pods" ]
    verbs: [ "get", "list", "watch", "patch" ]
  # Events need create permission for kopf operator framework
  - apiGroups: [ "" ]
    resources: [ "events" ]
    verbs: [ "get", "list", "watch", "create", "patch" ]
  - apiGroups: [ "networking.k8s.io" ]
    resources: [ "ingresses" ]
    verbs: [ "get", "list", "watch" ]
  - apiGroups: [ "discovery.k8s.io" ]
    resources: [ "endpointslices" ]
    verbs: [ "get", "list", "watch" ]
  - apiGroups: [ "apiextensions.k8s.io" ]
    resources: [ "customresourcedefinitions" ]
    verbs: [ "get", "list", "watch" ]
  # Webhook permissions
  - apiGroups: [ "admissionregistration.k8s.io" ]
    resources: [ "validatingwebhookconfigurations", "mutatingwebhookconfigurations" ]
    verbs: [ "get", "list", "watch", "create", "update", "patch", "delete" ]
  # Certificate management permissions for webhook TLS
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "create", "update", "patch", "delete" ]
