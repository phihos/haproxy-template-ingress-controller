apiVersion: batch/v1
kind: Job
metadata:
  name: haproxy-template-ic-webhook-cert-generator
  namespace: haproxy-template-ic
  labels:
    app.kubernetes.io/name: haproxy-template-ic
    app.kubernetes.io/component: webhook-cert-generator
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: haproxy-template-ic
        app.kubernetes.io/component: webhook-cert-generator
    spec:
      restartPolicy: OnFailure
      serviceAccountName: haproxy-template-ic
      containers:
      - name: cert-generator
        image: registry.k8s.io/ingress-nginx/kube-webhook-certgen:v1.4.0
        imagePullPolicy: IfNotPresent
        args:
        - create
        - --host=haproxy-template-ic-webhook,haproxy-template-ic-webhook.haproxy-template-ic.svc
        - --namespace=haproxy-template-ic
        - --secret-name=haproxy-template-ic-webhook-tls
        - --key-name=tls.key
        - --cert-name=tls.crt
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 2000
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
