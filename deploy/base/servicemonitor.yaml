apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: haproxy-template-ic
  namespace: haproxy-template-ic
  labels:
    app: haproxy-template-ic
spec:
  selector:
    matchLabels:
      app: haproxy-template-ic
      app.kubernetes.io/component: metrics
  endpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
