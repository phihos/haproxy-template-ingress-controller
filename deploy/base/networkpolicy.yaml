apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: haproxy-template-ic
  namespace: haproxy-template-ic
  labels:
    app: haproxy-template-ic
spec:
  podSelector:
    matchLabels:
      app: haproxy-template-ic
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow health check traffic
    - from: []
      ports:
        - protocol: TCP
          port: 8080
    # Allow metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 9090
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow Kubernetes API access
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow HAProxy Dataplane API access (assuming HAProxy pods in same namespace)
    - to:
        - podSelector:
            matchLabels:
              app: haproxy
      ports:
        - protocol: TCP
          port: 5555
