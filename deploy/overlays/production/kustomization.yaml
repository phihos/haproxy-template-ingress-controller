apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: haproxy-template-ic-prod

namePrefix: prod-

resources:
  - ../../base

patchesStrategicMerge:
  - deployment.yaml

images:
  - name: ghcr.io/phihos/haproxy-template-ingress-controller
    newTag: stable

replicas:
  - name: haproxy-template-ic
    count: 3
