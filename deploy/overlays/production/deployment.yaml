apiVersion: apps/v1
kind: Deployment
metadata:
  name: haproxy-template-ic
spec:
  template:
    spec:
      containers:
        - name: controller
          env:
            - name: VERBOSE
              value: "1"
            - name: STRUCTURED_LOGGING
              value: "true"
            - name: TRACING_ENABLED
              value: "true"
            - name: TRACING_SERVICE_NAME
              value: haproxy-template-ic
            - name: TRACING_SERVICE_VERSION
              value: "stable"
            - name: JAEGER_ENDPOINT
              value: "jaeger-collector.monitoring.svc.cluster.local:14268"
            - name: TRACING_SAMPLE_RATE
              value: "0.1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 5
