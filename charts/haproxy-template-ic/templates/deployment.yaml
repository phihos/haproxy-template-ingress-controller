apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "haproxy-template-ic.fullname" . }}
  labels:
    {{- include "haproxy-template-ic.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "haproxy-template-ic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "haproxy-template-ic.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "haproxy-template-ic.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: healthz
              containerPort: {{ .Values.controller.healthzPort }}
              protocol: TCP
            {{- if .Values.controller.metricsPort }}
            - name: metrics
              containerPort: {{ .Values.controller.metricsPort }}
              protocol: TCP
            {{- end }}
            {{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.pod.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: CONFIGMAP_NAME
              value: {{ .Values.controller.configmapName | quote }}
            - name: HEALTHZ_PORT
              value: {{ .Values.controller.healthzPort | quote }}
            - name: VERBOSE
              value: {{ .Values.controller.verbose | quote }}
            - name: SOCKET_PATH
              value: {{ .Values.controller.socketPath | quote }}
            {{- if .Values.controller.metricsPort }}
            - name: METRICS_PORT
              value: {{ .Values.controller.metricsPort | quote }}
            {{- end }}
            {{- if .Values.controller.structuredLogging }}
            - name: STRUCTURED_LOGGING
              value: {{ .Values.controller.structuredLogging | quote }}
            {{- end }}
            {{- if .Values.controller.tracing.enabled }}
            - name: TRACING_ENABLED
              value: {{ .Values.controller.tracing.enabled | quote }}
            {{- end }}
            {{- if .Values.controller.tracing.serviceName }}
            - name: TRACING_SERVICE_NAME
              value: {{ .Values.controller.tracing.serviceName | quote }}
            {{- end }}
            {{- if .Values.controller.tracing.serviceVersion }}
            - name: TRACING_SERVICE_VERSION
              value: {{ .Values.controller.tracing.serviceVersion | quote }}
            {{- end }}
            {{- if .Values.controller.tracing.jaegerEndpoint }}
            - name: JAEGER_ENDPOINT
              value: {{ .Values.controller.tracing.jaegerEndpoint | quote }}
            {{- end }}
            {{- if .Values.controller.tracing.sampleRate }}
            - name: TRACING_SAMPLE_RATE
              value: {{ .Values.controller.tracing.sampleRate | quote }}
            {{- end }}
            {{- if .Values.controller.tracing.consoleExport }}
            - name: TRACING_CONSOLE_EXPORT
              value: {{ .Values.controller.tracing.consoleExport | quote }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.webhook.enabled }}
            - name: webhook-certs
              mountPath: /etc/certs
              readOnly: true
            {{- end }}
            {{- if .Values.validation.enabled }}
            - name: validation-config
              mountPath: /etc/haproxy/validation
            {{- end }}
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- if .Values.validation.enabled }}
        - name: validation-haproxy
          image: "{{ .Values.haproxyImage.repository }}:{{ .Values.haproxyImage.tag }}"
          imagePullPolicy: {{ .Values.haproxyImage.pullPolicy }}
          command: ["/usr/local/bin/docker-entrypoint.sh"]
          ports:
            - name: validation
              containerPort: {{ .Values.validation.haproxy.port }}
              protocol: TCP
          volumeMounts:
            - name: validation-config
              mountPath: /etc/haproxy
            - name: validation-dataplane-config
              mountPath: /usr/local/bin/docker-entrypoint.sh
              subPath: docker-entrypoint.sh
            - name: validation-dataplane-config
              mountPath: /usr/local/etc/haproxy-default/haproxy.cfg
              subPath: haproxy-default.cfg
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.validation.haproxy.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
        - name: validation-dataplane
          image: "{{ .Values.haproxyImage.repository }}:{{ .Values.haproxyImage.tag }}"
          imagePullPolicy: {{ .Values.haproxyImage.pullPolicy }}
          command: ["/usr/local/bin/dataplane-entrypoint.sh"]
          ports:
            - name: validation-api
              containerPort: {{ .Values.dataplaneConfig.port }}
              protocol: TCP
          env:
            - name: HAPROXY_USERNAME
              value: {{ .Values.dataplaneConfig.username | quote }}
            - name: HAPROXY_PASSWORD
              value: {{ .Values.dataplaneConfig.passwords.validation | quote }}
          volumeMounts:
            - name: validation-config
              mountPath: /etc/haproxy
            - name: validation-dataplane-config
              mountPath: /usr/local/bin/dataplane-entrypoint.sh
              subPath: dataplane-entrypoint.sh
            - name: validation-dataplane-config
              mountPath: /usr/local/etc/dataplane-default/dataplaneapi.yaml
              subPath: dataplaneapi-default.yaml
              readOnly: true
            - name: validation-dataplane-config
              mountPath: /etc/haproxy/haproxy-socket-reload.sh
              subPath: haproxy-socket-reload.sh
              readOnly: true
          livenessProbe:
            httpGet:
              path: /v3/info
              port: {{ .Values.dataplaneConfig.port }}
              httpHeaders:
                - name: Authorization
                  value: "Basic {{ printf "%s:%s" .Values.dataplaneConfig.username .Values.dataplaneConfig.passwords.validation | b64enc }}"
            initialDelaySeconds: 15
            periodSeconds: 10
        {{- end }}
      volumes:
        {{- if .Values.webhook.enabled }}
        - name: webhook-certs
          secret:
            secretName: {{ include "haproxy-template-ic.fullname" . }}-webhook-tls
            defaultMode: 420
        {{- end }}
        {{- if .Values.validation.enabled }}
        - name: validation-config
          emptyDir: {}
        - name: validation-dataplane-config
          configMap:
            name: {{ include "haproxy-template-ic.fullname" . }}-validation-config
            defaultMode: 420
            items:
              - key: dataplaneapi-default.yaml
                path: dataplaneapi-default.yaml
                mode: 420
              - key: haproxy-socket-reload.sh
                path: haproxy-socket-reload.sh
                mode: 0755
              - key: docker-entrypoint.sh
                path: docker-entrypoint.sh
                mode: 0755
              - key: dataplane-entrypoint.sh
                path: dataplane-entrypoint.sh
                mode: 0755
              - key: haproxy-default.cfg
                path: haproxy-default.cfg
                mode: 420
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
