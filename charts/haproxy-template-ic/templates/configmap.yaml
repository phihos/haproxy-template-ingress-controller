apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.controller.configmapName }}
  labels:
    {{- include "haproxy-template-ic.labels" . | nindent 4 }}
  namespace: {{ .Release.Namespace }}
data:
  config: |
    pod_selector:
      match_labels:
        app: haproxy
    haproxy_config: |
      global
          daemon
          user haproxy
          group haproxy
      
      defaults
          mode http
          timeout connect 5000
          timeout client 50000
          timeout server 50000
          
      frontend main
          bind *:80
          default_backend servers
          
      backend servers
          balance roundrobin
          {{ "{{" }}- for _, endpoint in resources.get('endpoints', {}).items() {{ "}}" }}
          {{ "{{" }}- for ep in endpoint.endpoints {{ "}}" }}
          {{ "{{" }}- for address in ep.addresses {{ "}}" }}
          server {{ "{{" }} endpoint.metadata.name {{ "}}" }}_{{ "{{" }} loop.index {{ "}}" }} {{ "{{" }} address {{ "}}" }}:80 check
          {{ "{{" }}- endfor {{ "}}" }}
          {{ "{{" }}- endfor {{ "}}" }}
          {{ "{{" }}- endfor {{ "}}" }}
    watch_resources:
      ingresses:
        group: networking.k8s.io
        kind: Ingress
    maps:
      /etc/haproxy/maps/backend.map:
        template: |
          {% for svc in resources.get('services', []) %}
          server {{ "{{" }} svc.name {{ "}}" }} {{ "{{" }} svc.ip {{ "}}" }}:{{ "{{" }} svc.port {{ "}}" }}
          {% endfor %}
