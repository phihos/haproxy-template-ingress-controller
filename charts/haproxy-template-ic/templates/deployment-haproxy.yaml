{{- if .Values.haproxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "haproxy-template-ic.fullname" . }}-haproxy
  labels:
    {{- include "haproxy-template-ic.labels" . | nindent 4 }}
    app: haproxy
    component: loadbalancer
spec:
  replicas: {{ .Values.haproxy.replicas }}
  selector:
    matchLabels:
      app: haproxy
      component: loadbalancer
      {{- include "haproxy-template-ic.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "haproxy-template-ic.labels" . | nindent 8 }}
        app: haproxy
        component: loadbalancer
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: haproxy
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.haproxyImage.repository }}:{{ .Values.haproxyImage.tag }}"
          imagePullPolicy: {{ .Values.haproxyImage.pullPolicy }}
          command: ["/usr/local/bin/docker-entrypoint.sh"]
          ports:
            - name: http
              containerPort: {{ .Values.haproxy.ports.http }}
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: health
              containerPort: {{ .Values.haproxy.ports.health }}
              protocol: TCP
          volumeMounts:
            - name: haproxy-config
              mountPath: /etc/haproxy
            - name: dataplane-config
              mountPath: /usr/local/bin/docker-entrypoint.sh
              subPath: docker-entrypoint.sh
            - name: dataplane-config
              mountPath: /usr/local/etc/haproxy-default/haproxy.cfg
              subPath: haproxy-default.cfg
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.haproxy.ports.health }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.haproxy.ports.health }}
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.haproxy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: dataplane
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.haproxyImage.repository }}:{{ .Values.haproxyImage.tag }}"
          imagePullPolicy: {{ .Values.haproxyImage.pullPolicy }}
          command: ["/usr/local/bin/dataplane-entrypoint.sh"]
          ports:
            - name: dataplane-api
              containerPort: {{ .Values.dataplaneConfig.port }}
              protocol: TCP
          env:
            - name: HAPROXY_USERNAME
              value: {{ .Values.dataplaneConfig.username | quote }}
            - name: HAPROXY_PASSWORD
              value: {{ .Values.haproxy.dataplane.password | quote }}
          volumeMounts:
            - name: haproxy-config
              mountPath: /etc/haproxy
            - name: dataplane-config
              mountPath: /usr/local/bin/dataplane-entrypoint.sh
              subPath: dataplane-entrypoint.sh
            - name: dataplane-config
              mountPath: /usr/local/etc/dataplane-default/dataplaneapi.yaml
              subPath: dataplaneapi-default.yaml
              readOnly: true
            - name: dataplane-config
              mountPath: /etc/haproxy/haproxy-socket-reload.sh
              subPath: haproxy-socket-reload.sh
              readOnly: true
          livenessProbe:
            httpGet:
              path: /v3/info
              port: {{ .Values.dataplaneConfig.port }}
              httpHeaders:
                - name: Authorization
                  value: "Basic {{ printf "%s:%s" .Values.dataplaneConfig.username .Values.dataplaneConfig.passwords.production | b64enc }}"
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v3/info
              port: {{ .Values.dataplaneConfig.port }}
              httpHeaders:
                - name: Authorization
                  value: "Basic {{ printf "%s:%s" .Values.dataplaneConfig.username .Values.dataplaneConfig.passwords.production | b64enc }}"
            initialDelaySeconds: 10
            periodSeconds: 5
          {{- with .Values.haproxy.dataplane.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: haproxy-config
          emptyDir: {}
        - name: dataplane-config
          configMap:
            name: {{ include "haproxy-template-ic.fullname" . }}-production-config
            defaultMode: 420
            items:
              - key: dataplaneapi-default.yaml
                path: dataplaneapi-default.yaml
                mode: 420
              - key: haproxy-socket-reload.sh
                path: haproxy-socket-reload.sh
                mode: 0755
              - key: docker-entrypoint.sh
                path: docker-entrypoint.sh
                mode: 0755
              - key: dataplane-entrypoint.sh
                path: dataplane-entrypoint.sh
                mode: 0755
              - key: haproxy-default.cfg
                path: haproxy-default.cfg
                mode: 420
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
