# Default values for haproxy-template-ic.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/phihos/haproxy-template-ingress-controller
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# Shared HAProxy image configuration for all HAProxy and Dataplane API containers
haproxyImage:
  repository: haproxytech/haproxy-alpine
  tag: "3.1"
  pullPolicy: IfNotPresent

# Unified dataplane configuration for all instances
dataplaneConfig:
  port: 5555
  username: admin
  # Environment-specific passwords
  passwords:
    production: adminpass
    validation: validationpass

# Controller configuration
controller:
  configmapName: haproxy-template-ic-config
  healthzPort: 8080
  verbose: 1
  socketPath: /run/haproxy-template-ic/management.sock
  # Metrics configuration
  metricsPort: 9090
  # Structured logging configuration
  structuredLogging: false
  # Distributed tracing configuration
  tracing:
    enabled: false
    serviceName: haproxy-template-ic
    serviceVersion: ""  # Uses chart version if empty
    jaegerEndpoint: ""  # e.g., "jaeger-collector:14268"
    sampleRate: 1.0
    consoleExport: false

# Validation sidecars configuration  
validation:
  enabled: true
  haproxy:
    port: 8404

# Production HAProxy configuration
haproxy:
  enabled: true
  replicas: 2
  ports:
    http: 80
    health: 8404
  service:
    type: ClusterIP
    ports:
      http: 80
      https: 443
      health: 8404
      dataplane: 5555
  resources: {}

# Validating Admission Webhook configuration
webhook:
  enabled: true
  failurePolicy: Fail
  # TLS configuration for webhook server
  tls:
    # Certificate generation method: "cert-manager" or "self-signed"
    certProvider: "self-signed"
    # For cert-manager, specify issuer
    certManager:
      issuerRef:
        name: ""
        kind: ClusterIssuer
    # For self-signed certs, they will be generated automatically
    selfSigned:
      # Certificate validity duration
      duration: "8760h"  # 1 year
  # Service configuration for webhook
  service:
    port: 8443
    type: ClusterIP
  # Webhook-specific pod settings
  pod:
    port: 8443
    annotations: {}
  # Resource limits and requests for webhook
  resources: {}
  # Node selector for webhook pods
  nodeSelector: {}
  # Tolerations for webhook pods  
  tolerations: []
  # Affinity rules for webhook pods
  affinity: {}
  config:
    pod_selector:
      match_labels:
        app: haproxy
        component: loadbalancer
    watched_resources:
      ingresses:
        api_version: networking.k8s.io/v1
        kind: Ingress
        # Enable validation webhook for Ingress resources to prevent faulty configs
        enable_validation_webhook: true
        # Default indexing by namespace and name for standard iteration
        index_by: ["metadata.namespace", "metadata.name"]
      endpoints:
        api_version: discovery.k8s.io/v1
        kind: EndpointSlice
        # Leave validation disabled for critical resources like EndpointSlices
        enable_validation_webhook: false
        # Custom indexing by service name for O(1) service-to-endpoints matching
        index_by: ["metadata.labels['kubernetes.io/service-name']"]
      services:
        api_version: v1
        kind: Service
        # Enable validation for Services to catch port/selector issues
        enable_validation_webhook: true
        # Index by namespace and app label for cross-resource matching
        index_by: ["metadata.namespace", "metadata.labels['app']"]
      secrets:
        api_version: v1
        kind: Secret
        # Enable validation for TLS secrets to catch certificate issues early
        enable_validation_webhook: true
        # Index by namespace and type for efficient TLS secret lookup
        index_by: ["metadata.namespace", "type"]
    template_snippets:
      backend-name:
        name: backend-name
        template: |
          ing_{{ ingress.metadata.namespace }}_{{ ingress.metadata.name }}_{{ path.backend.service.name }}_{{ path.backend.service.port.name | default(path.backend.service.port.number) }}
      service-lookup-example:
        name: service-lookup-example
        template: |
          {# Example of using indexed lookup to find services by app label #}
          {% set app_label = ingress.metadata.labels.get('app', '') %}
          {% if app_label %}
            {% set service = resources.get('services').get_indexed_single(ingress.metadata.namespace, app_label) %}
            {% if service %}
              {# Found matching service: {{ service.metadata.name }} #}
            {% endif %}
          {% endif %}
      path-map-entry:
        name: path-map-entry
        template: |
          {# Generate map entries for paths matching specified pathTypes #}
          {# Usage: {% include "path-map-entry" with context %} where path_types = ["Exact"] or ["Prefix", "ImplementationSpecific"] #}
          {% for _, ingress in resources.get('ingresses', {}).items() %}
          {% for rule in (ingress.spec.get('rules', []) | selectattr("http", "defined")) %}
          {% for path in (rule.http.get('paths', []) | selectattr("path", "defined") | selectattr("pathType", "in", path_types)) %}
          {{ rule.host }}{{ path.path }} {% include "backend-name" %}{{ suffix }}
          {% endfor %}
          {% endfor %}
          {% endfor %}
      validate-ingress:
        name: validate-ingress
        template: |
          {# Validation snippet for ingress resources #}
          {% if not ingress.spec %}
            {% do register_error('ingresses', ingress.metadata.uid, 'Ingress missing spec') %}
          {% endif %}
          {% if ingress.spec.rules %}
            {% for rule in ingress.spec.rules %}
              {% if not rule.host %}
                {% do register_error('ingresses', ingress.metadata.uid, 'Ingress rule missing host') %}
              {% endif %}
            {% endfor %}
          {% endif %}
      backend-servers:
        name: backend-servers
        template: |
          {# Generate backend server entries from EndpointSlice using indexed lookup #}
          {# This demonstrates O(1) lookup using custom indexing by service name #}
          {% for endpoint_slice in resources.get('endpoints', {}).get_indexed(service_name) %}
            {% for endpoint in endpoint_slice.endpoints %}
              {% for address in endpoint.addresses %}
          server {{ service_name }}_{{ loop.index }} {{ address }}:{{ port }}
              {% endfor %}
            {% endfor %}
          {% endfor %}
      ingress-backends:
        name: ingress-backends
        template: |
          {# Generate all backend definitions from ingress resources #}
          {# Usage: {% include "ingress-backends" %} #}
          {% for _, ingress in resources.get('ingresses', {}).items() %}
          {% include "validate-ingress" %}
          {% if ingress.spec and ingress.spec.rules %}
          {% for rule in ingress.spec.rules %}
          {% if rule.http and rule.http.paths %}
          {% for path in rule.http.paths %}
          {% if path.backend and path.backend.service %}
          {% set service_name = path.backend.service.name %}
          {% set port = path.backend.service.port.number | default(80) %}
          backend {% include "backend-name" %}
              balance roundrobin
              option httpchk GET {{ path.path | default('/') }}
          {% include "backend-servers" %}
          {% endif %}
          {% endfor %}
          {% endif %}
          {% endfor %}
          {% endif %}
          {% endfor %}
    maps:
      "/etc/haproxy/maps/host.map":
        template: |
          # This map is used to match the host header (without ":port") to a normalized host identifier for path routing.
          # Example: www.example.com -> example.com
          {% for _, ingress in resources.get('ingresses', {}).items() %}
          {% if ingress.spec and ingress.spec.rules %}
          {% for rule in ingress.spec.rules %}
          {% if rule.host %}
          {{ rule.host }} {{ rule.host }}
          {% endif %}
          {% endfor %}
          {% endif %}
          {% endfor %}
      "/etc/haproxy/maps/path-exact.map":
        template: |
          # This map is used to match the host header (without ":port") concatenated with the requested path (without query params) to an HAProxy backend defined in haproxy.cfg.
          # It should be used with the equality string matcher. Example:
          #   http-request set-var(txn.path_match) var(txn.host_match),concat(,txn.path,),map(/etc/haproxy/maps/path-exact.map)
          {% set path_types = ["Exact"] %}
          {% set suffix = "" %}
          {% include "path-map-entry" %}
      "/etc/haproxy/maps/path-prefix-exact.map":
        template: |
          # This map is used to match the host header (without ":port") concatenated with the requested path (without query params) to an HAProxy backend defined in haproxy.cfg.
          {% set path_types = ["Prefix", "ImplementationSpecific"] %}
          {% set suffix = "" %}
          {% include "path-map-entry" %}
      "/etc/haproxy/maps/path-prefix.map":
        template: |
          # This map is used to match the host header (without ":port") concatenated with the requested path (without query params) to an HAProxy backend defined in haproxy.cfg.
          # It should be used with the prefix string matcher. Example:
          #   http-request set-var(txn.path_match) var(txn.host_match),concat(,txn.path,),map_beg(/etc/haproxy/maps/path-prefix.map)
          {% set path_types = ["Prefix", "ImplementationSpecific"] %}
          {% set suffix = "/" %}
          {% include "path-map-entry" %}
    certificates:
      "/etc/haproxy/certs/tls.pem":
        template: |
          {# Generate combined cert+key file for HAProxy from TLS secrets using indexed lookup #}
          {% for secret in resources.get('secrets', {}).get_indexed('default', 'kubernetes.io/tls') %}
          {% if secret.metadata.labels.get('haproxy-template-ic/tls') == 'true' %}
          # Certificate for {{ secret.metadata.name }} in {{ secret.metadata.namespace }}
          {{ secret.data.get('tls.crt') | b64decode }}
          {{ secret.data.get('tls.key') | b64decode }}
          
          {% endif %}
          {% endfor %}
    haproxy_config:
      template: |
        global
            log stdout len 65536 local0 info
            chroot /var/lib/haproxy
            stats socket /etc/haproxy/haproxy-master.sock mode 600 level admin
            stats timeout 30s
            user haproxy
            group haproxy
            daemon
            ca-base /etc/ssl/certs
            crt-base /etc/haproxy/certs
            tune.ssl.default-dh-param 2048

        defaults
            mode http
            log global
            option httplog
            option dontlognull
            option log-health-checks
            option forwardfor
            option httpchk GET /
            timeout connect 5000
            timeout client 50000
            timeout server 50000
            errorfile 400 /etc/haproxy/errors/400.http
            errorfile 403 /etc/haproxy/errors/403.http
            errorfile 408 /etc/haproxy/errors/408.http
            errorfile 500 /etc/haproxy/errors/500.http
            errorfile 502 /etc/haproxy/errors/502.http
            errorfile 503 /etc/haproxy/errors/503.http
            errorfile 504 /etc/haproxy/errors/504.http

        frontend http_frontend
            bind *:80
            redirect scheme https code 301 if !{ ssl_fc }

        frontend https_frontend
            bind *:443 ssl crt /etc/haproxy/certs/tls.pem

            # Set a few variables
            http-request set-var(txn.base) base
            http-request set-var(txn.path) path
            http-request set-var(txn.host) req.hdr(Host),field(1,:),lower
            http-request set-var(txn.host_match) var(txn.host),map(/etc/haproxy/maps/host.map)
            http-request set-var(txn.host_match) var(txn.host),regsub(^[^.]*,,),map(/etc/haproxy/maps/host.map,'') if !{ var(txn.host_match) -m found }
            http-request set-var(txn.path_match) var(txn.host_match),concat(,txn.path,),map(/etc/haproxy/maps/path-exact.map)
            http-request set-var(txn.path_match) var(txn.host_match),concat(,txn.path,),map(/etc/haproxy/maps/path-prefix-exact.map) if !{ var(txn.path_match) -m found }
            http-request set-var(txn.path_match) var(txn.host_match),concat(,txn.path,),map_beg(/etc/haproxy/maps/path-prefix.map) if !{ var(txn.path_match) -m found }
            
            # Use path maps for routing
            use_backend %[var(txn.path_match)]
            
            # Default backend
            default_backend default_backend

        {% include "ingress-backends" %}

        backend default_backend
            http-request return status 404

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
# Health probes
livenessProbe:
  httpGet:
    path: /healthz
    port: healthz
readinessProbe:
  httpGet:
    path: /healthz
    port: healthz

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# RBAC
rbac:
  create: true

# Monitoring configuration
monitoring:
  # ServiceMonitor for Prometheus Operator
  serviceMonitor:
    enabled: false
    # Additional labels for ServiceMonitor
    labels: {}
    # Additional annotations for ServiceMonitor
    annotations: {}
    # Scrape interval
    interval: 30s
    # Scrape timeout
    scrapeTimeout: 10s
    # Relabeling configurations
    relabelings: []
    # Metric relabeling configurations
    metricRelabelings: []

# Network Policy configuration
networkPolicy:
  enabled: false
  # Monitoring access configuration
  monitoring:
    # Pod selector for monitoring systems (e.g., Prometheus)
    podSelector: {}
    # Namespace selector for monitoring systems
    namespaceSelector: {}
  # Kubernetes API access configuration
  kubernetesApi:
    # Usually the cluster CIDR or specific API server IPs
    - ipBlock:
        cidr: 10.0.0.0/8
  # HAProxy pods access configuration
  haproxy:
    podSelector:
      matchLabels:
        app: haproxy
  # Additional egress rules
  additionalEgress: []

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  # Only one of minAvailable or maxUnavailable should be set
  minAvailable: 1
  # maxUnavailable: 1
