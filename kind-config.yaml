kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
        # Optimize for faster startup
        fail-swap-on: "false"
        cgroup-driver: "cgroupfs"
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
  # Optimize for faster startup
  kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        enable-admission-plugins: "NodeRestriction"
        disable-admission-plugins: "ServiceAccount"
        # Reduce API server startup time
        request-timeout: "30s"
        max-requests-inflight: "1000"
        max-mutating-requests-inflight: "500"
    scheduler:
      extraArgs:
        v: "1"
        # Reduce scheduler startup time
        profiling: "false"
    controllerManager:
      extraArgs:
        v: "1"
        # Reduce controller manager startup time
        profiling: "false"
        # Disable unnecessary controllers for testing
        controllers: "*,bootstrapsigner,tokencleaner"
  # Use a smaller, faster node image
  image: kindest/node:v1.28.0@sha256:b7a6ec3f3d0e1839738bda7e69930f47c0f7f20e183f16858b7c9c86c0e9c0a3
