repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Check YAML files have valid syntax.
      - id: check-yaml
        exclude: ^charts/.*/templates/.*\.ya?ml$
      # Sort YAML files.
      - id: sort-simple-yaml
        exclude: ^charts/.*/templates/.*\.ya?ml$
      # Ensure YAML files end with a newline.
      - id: end-of-file-fixer
        types: [yaml]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: "0.8.8"
    hooks:
      - id: uv-lock
        name: check uv lock file consistency
        args: ["--locked"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.12.8
    hooks:
      # Run the linter.
      - id: ruff-check
        args: [--fix]
      # Run the formatter.
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies: [types-PyYAML, types-click]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "haproxy_template_ic/"]
        additional_dependencies: ["bandit[toml]"]

  - repo: https://github.com/fpgmaas/deptry.git
    rev: 0.23.1
    hooks:
      - id: deptry
        entry: uv run deptry .
        args: []

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.8.3
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [push]
